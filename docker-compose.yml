services:
  postgres:
    image: postgres:16-alpine
    container_name: projekt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: secure_ai_demo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d secure_ai_demo"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./server
    container_name: projekt-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/secure_ai_demo?schema=public
      CLIENT_ORIGINS: https://31.97.72.66,https://extreme-group.pl,https://www.extreme-group.pl,http://localhost:6080,http://31.97.72.66:6080
      COOKIE_SIGNING_SECRET: ${COOKIE_SIGNING_SECRET:-change-me-with-at-least-32-characters-1234567890}
      COOKIE_SECURE: "true"
      COOKIE_DOMAIN: ""
      SESSION_TTL_HOURS: "24"
      TRUST_PROXY: "true"
      SERVE_CLIENT_BUILD: "false"
      LOG_LEVEL: info
      RECAPTCHA_PROJECT_ID: projekt-492819
      RECAPTCHA_SITE_KEY: 6LdFV68sAAAAAAaRL-r44RHRz0-ba-4olFMzai4
      RECAPTCHA_LOGIN_ACTION: login
      RECAPTCHA_MIN_SCORE: "0.7"
      RECAPTCHA_ENABLED: "true"
      RECAPTCHA_ENFORCE_HOST: 31.97.72.66
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    build:
      context: ./client
      args:
        VITE_BASE_PATH: /Projekt/
        VITE_RECAPTCHA_ENABLED: "true"
        VITE_RECAPTCHA_ENFORCE_HOST: 31.97.72.66
        VITE_RECAPTCHA_SITE_KEY: 6LdFV68sAAAAAAaRL-r44RHRz0-ba-4olFMzai4
    container_name: projekt-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "6080:6000"
    volumes:
      - ./nginx.projekt.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
